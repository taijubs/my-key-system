<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Key System Generator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 400px; border: 1px solid #333; }
        h1 { color: #00ff88; }
        .key-box { background: #2a2a2a; padding: 15px; border-radius: 8px; margin: 20px 0; font-family: monospace; font-size: 20px; color: #ff0077; border: 1px dashed #555; }
        button { background: #00ff88; color: #121212; border: none; padding: 12px 25px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h1>Key Today</h1>
    <p>Salin key ini ke executor kamu:</p>
    <div class="key-box" id="keyDisplay">TAIJUBS-24APR</div>
    <button onclick="copyKey()">Salin Key</button>
</div>
<script>
    function copyKey() {
        var text = document.getElementById('keyDisplay').innerText;
        navigator.clipboard.writeText(text);
        alert("Key berhasil disalin!");
    }
</script>
</body>
</html>
